services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/.venv
      - cache_data:/cache
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=1
    user: root
    command: sh -c "uv sync --frozen && uv run flask run --host=0.0.0.0 --port=5000 --reload"

volumes:
  cache_data:
