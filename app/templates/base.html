<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Home Base{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Chivo+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-main d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="{{ url_for('static', filename='img/homebase-logo.png') }}" alt="Home Base">
            </a>
            <div class="d-flex align-items-center gap-4">
                <a class="nav-link" href="/standings">Standings</a>
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Teams
                    </a>
                    <div class="dropdown-menu teams-dropdown dropdown-menu-end">
                        <div class="row row-cols-6 g-1">
                            {% for team in mlb_teams %}
                            <div class="col">
                                <a class="team-item" href="/team/{{ team.id }}">
                                    <img src="{{ team_logo_url(team.id) }}" alt="{{ team.abbr }}">
                                    {{ team.abbr }}
                                </a>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                <a class="nav-link" href="/leaderboards">Leaders</a>
            </div>
        </div>
    </nav>

    <div class="container-main py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
